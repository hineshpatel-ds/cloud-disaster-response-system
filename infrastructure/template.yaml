AWSTemplateFormatVersion: '2010-09-09'
Description: Disaster Response System Infrastructure

Resources:

  IncidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Incidents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: incidentId
          AttributeType: S
      KeySchema:
        - AttributeName: incidentId
          KeyType: HASH

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DisasterLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt IncidentsTable.Arn

    CreateIncidentLambda:
      Type: AWS::Lambda::Function
      Properties:
        FunctionName: CreateIncidentFunction
        Runtime: python3.12
        Handler: create_incident.lambda_handler
        Role: !GetAtt LambdaExecutionRole.Arn
        Code:
          S3Bucket: hinesh-disaster-lambda-code-2026
          S3Key: create_incident.zip
        Timeout: 10